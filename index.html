<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>シフトカレンダー</title>
<style>
:root {
  --system-bg: #f2f2f7;
  --card-bg: #ffffff;
  --separator: rgba(60, 60, 67, 0.12);
  --label-primary: #000000;
  --label-secondary: rgba(60, 60, 67, 0.6);
  --label-tertiary: rgba(60, 60, 67, 0.3);
  --tint: #007aff;
  --sat-color: #007aff;
  --late-bg: #fff3e0; --late-fg: #c77800; --late-border: #f5c882;
  --off-bg: #fce8ec;  --off-fg: #c5294a;  --off-border: #f0a0b0;
  --sat-bg: #f0e8f7;  --sat-fg: #7b3dab;  --sat-border: #cda8e8;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
@media (prefers-color-scheme: dark) {
  :root {
    --system-bg: #000000;
    --card-bg: #1c1c1e;
    --separator: rgba(84, 84, 88, 0.65);
    --label-primary: #ffffff;
    --label-secondary: rgba(235, 235, 245, 0.6);
    --label-tertiary: rgba(235, 235, 245, 0.3);
    --tint: #0a84ff;
    --sat-color: #0a84ff;
    --late-bg: #3a2a00; --late-fg: #ffb340; --late-border: #5a4000;
    --off-bg: #3a0a15;  --off-fg: #ff6b8a;  --off-border: #5a1a2a;
    --sat-bg: #2a1540;  --sat-fg: #c8a0f0;  --sat-border: #4a2a6a;
  }
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'SF Pro Text', 'Hiragino Sans', sans-serif;
  background: var(--system-bg); color: var(--label-primary);
  -webkit-font-smoothing: antialiased;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
}

/* Navigation Bar */
.navbar {
  background: var(--card-bg);
  border-bottom: 0.5px solid var(--separator);
  padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  background: rgba(255,255,255,0.85);
}
@media (prefers-color-scheme: dark) {
  .navbar { background: rgba(28,28,30,0.85); }
}
.navbar-title {
  font-size: 17px; font-weight: 600; letter-spacing: -0.4px;
}
.month-select {
  font-family: inherit; font-size: 15px; font-weight: 500;
  color: var(--tint); background: transparent;
  border: none; cursor: pointer;
  padding: 8px 4px;
  -webkit-appearance: none; appearance: none;
  min-height: 44px;
}
.month-select option { color: var(--label-primary); background: var(--card-bg); }

/* Legend */
.legend {
  display: flex; gap: 16px; padding: 8px 16px;
  font-size: 12px; color: var(--label-secondary);
  background: var(--system-bg);
}
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }

/* Day of week header */
.dow-row {
  display: grid; grid-template-columns: repeat(6, 1fr);
  background: var(--system-bg);
  padding: 6px 0;
}
.dow-cell {
  text-align: center; font-size: 11px; font-weight: 600;
  color: var(--label-secondary); text-transform: uppercase;
}
.dow-cell.sat { color: var(--sat-color); }

/* Calendar Grid */
.cal-grid {
  display: grid; grid-template-columns: repeat(6, 1fr);
  gap: 0.5px; background: var(--separator);
  margin: 0;
}

.day-cell {
  background: var(--card-bg); min-height: 110px; padding: 6px;
  display: flex; flex-direction: column;
}
.day-cell.empty { background: var(--system-bg); min-height: 30px; }
.day-cell.sat-bg { background: rgba(0, 122, 255, 0.04); }
@media (prefers-color-scheme: dark) {
  .day-cell.sat-bg { background: rgba(10, 132, 255, 0.08); }
}

/* Day number */
.day-num {
  font-size: 16px; font-weight: 400; width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; margin-bottom: 2px;
  color: var(--label-primary);
  font-variant-numeric: tabular-nums;
}
.day-cell.sat-bg .day-num { color: var(--sat-color); }

/* Event */
.day-event {
  font-size: 10px; font-weight: 500; color: var(--late-fg);
  line-height: 1.4; margin-bottom: 3px; word-break: break-all;
}

/* Content area */
.day-content {
  flex: 1; display: flex; flex-direction: column; gap: 2px;
}

/* Person tags - pill style */
.person-tag {
  display: inline-block;
  padding: 2px 6px;
  border-radius: 10px;
  font-size: 10px; font-weight: 500;
  line-height: 1.5;
  white-space: nowrap;
}
.tag-late { background: var(--late-bg); color: var(--late-fg); }
.tag-off  { background: var(--off-bg);  color: var(--off-fg); }
.tag-sat  { background: var(--sat-bg);  color: var(--sat-fg); }

/* Empty state */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 80px 20px; color: var(--label-tertiary); grid-column: 1 / -1;
}
.empty-state p { font-size: 15px; margin-top: 8px; }

/* Desktop */
@media (min-width: 768px) {
  .day-cell { min-height: 140px; padding: 8px; }
  .day-num { font-size: 18px; width: 32px; height: 32px; }
  .person-tag { font-size: 12px; padding: 2px 8px; }
  .day-event { font-size: 12px; }
  .navbar { padding: 14px 24px; }
  .navbar-title { font-size: 20px; }
}
</style>
</head>
<body>

<nav class="navbar">
  <span class="navbar-title">シフトカレンダー</span>
  <select class="month-select" id="monthSelect">
    <option value="">読み込み中...</option>
  </select>
</nav>

<div class="legend">
  <div class="legend-item"><span class="legend-dot" style="background:var(--late-fg)"></span>遅番</div>
  <div class="legend-item"><span class="legend-dot" style="background:var(--off-fg)"></span>休み</div>
  <div class="legend-item"><span class="legend-dot" style="background:var(--sat-fg)"></span>土曜</div>
</div>

<div class="dow-row">
  <div class="dow-cell">月</div><div class="dow-cell">火</div><div class="dow-cell">水</div>
  <div class="dow-cell">木</div><div class="dow-cell">金</div><div class="dow-cell sat">土</div>
</div>

<div id="calGrid" class="cal-grid">
  <div class="empty-state"><p>読み込み中...</p></div>
</div>

<script>
const cache = {};
let currentMonth = '';
const nocache = '?v=' + Date.now();

function isLate(shift) {
  const p = shift.split(' / ')[0];
  return /遅|^中[12]F/.test(p);
}
function isOff(shift) {
  const p = shift.split(' / ')[0];
  return /休/.test(p) || p === '有給';
}
function isSat(shift) {
  const p = shift.split(' / ')[0];
  return p.startsWith('土');
}
function pat(shift) { return shift.split(' / ')[0]; }

function buildCalendar(data) {
  const grid = document.getElementById('calGrid');
  if (!data) {
    grid.innerHTML = '<div class="empty-state"><p>データがありません</p></div>';
    return;
  }
  let html = '';
  const startCol = data.startDow >= 6 ? 0 : data.startDow;
  for (let i = 0; i < startCol; i++) html += '<div class="day-cell empty"></div>';

  for (let d = 1; d <= data.daysInMonth; d++) {
    const dowIdx = (data.startDow + d - 1) % 7;
    if (dowIdx === 6) continue;
    const idx = data.days.indexOf(d);
    const bgClass = dowIdx === 5 ? 'sat-bg' : '';
    const ev = idx >= 0 ? data.events[idx] : '';

    const late = [], off = [], sat = [];
    if (idx >= 0) {
      data.staff.forEach(p => {
        const s = p.shifts[String(d)];
        if (!s) return;
        if (isLate(s)) late.push({ name: p.name, pattern: pat(s) });
        if (isOff(s)) off.push({ name: p.name, pattern: pat(s) });
        if (isSat(s)) sat.push({ name: p.name, pattern: pat(s) });
      });
    }

    html += `<div class="day-cell ${bgClass}">`;
    html += `<span class="day-num">${d}</span>`;
    if (ev) html += `<div class="day-event">${ev}</div>`;
    html += '<div class="day-content">';

    if (late.length) {
      late.forEach(p => { html += `<span class="person-tag tag-late">${p.pattern} ${p.name}</span>`; });
    }
    if (sat.length) {
      sat.forEach(p => { html += `<span class="person-tag tag-sat">${p.pattern} ${p.name}</span>`; });
    }
    if (off.length) {
      off.forEach(p => { html += `<span class="person-tag tag-off">${p.pattern} ${p.name}</span>`; });
    }
    html += '</div></div>';
  }

  const cells = document.createElement('div');
  cells.innerHTML = html;
  const count = cells.querySelectorAll('.day-cell').length;
  for (let i = 0; i < (6 - count % 6) % 6; i++) html += '<div class="day-cell empty"></div>';
  grid.innerHTML = html;
}

async function loadMonth(key) {
  if (cache[key]) return cache[key];
  const res = await fetch(`data/${key}.json` + nocache);
  if (!res.ok) return null;
  const data = await res.json();
  cache[key] = data;
  return data;
}

async function switchMonth(key) {
  currentMonth = key;
  const data = await loadMonth(key);
  buildCalendar(data);
  if (data) document.title = `シフトカレンダー ${data.year}年${data.month}月`;
}

document.getElementById('monthSelect').addEventListener('change', e => {
  if (e.target.value) switchMonth(e.target.value);
});

(async function() {
  try {
    const res = await fetch('data/months.json' + nocache);
    const months = await res.json();
    const sel = document.getElementById('monthSelect');
    const keys = Object.keys(months).sort();
    if (keys.length === 0) {
      sel.innerHTML = '<option>データなし</option>';
      document.getElementById('calGrid').innerHTML = '<div class="empty-state"><p>データがありません</p></div>';
      return;
    }
    sel.innerHTML = keys.map(k => `<option value="${k}">${months[k]}</option>`).join('');
    const latest = keys[keys.length - 1];
    sel.value = latest;
    switchMonth(latest);
  } catch(e) {
    document.getElementById('monthSelect').innerHTML = '<option>読み込みエラー</option>';
    document.getElementById('calGrid').innerHTML = '<div class="empty-state"><p>data/months.json が見つかりません。<br>convert.py を実行してください。</p></div>';
  }
})();
</script>
</body>
</html>
